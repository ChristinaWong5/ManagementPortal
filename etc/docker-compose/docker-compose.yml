services:
  configtest-web:
    image: configtest-web:latest
    container_name: configtest-web
    hostname: configtest-web
    build:
      context: ../../
      dockerfile: src/ConfigTest.Web/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=ede7bd7c-8c35-4148-adcb-9f3fd05c70ae
      - App__SelfUrl=https://localhost:44361
      - App__HealthCheckUrl=http://configtest-web:8080/health-status
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__Authority=http://configtest-web:8080      
      - ConnectionStrings__Default=DataSource=/data/ConfigTest.db
    ports:
      - "44361:8081"
    depends_on:
      sqlite:
        condition: service_healthy
    restart: on-failure
    volumes:
      - sqlite_data:/data
      - ./certs:/app/certs
    networks:
      - abp-network

  

  
  db-migrator:
    image: configtest-db-migrator:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: src/ConfigTest.DbMigrator/Dockerfile.local
    environment:
      - OpenIddict__Applications__ConfigTest_Web__RootUrl=https://localhost:44361
      - OpenIddict__Applications__ConfigTest_Swagger__RootUrl=https://localhost:44341
      - ConnectionStrings__Default=DataSource=/data/ConfigTest.db
    restart: on-failure
    volumes:
      - sqlite_data:/data
    depends_on:
      sqlite:
        condition: service_healthy
    networks:
      - abp-network
  
  sqlite:
    container_name: sqlite-container
    image: alpine:latest    
    command: sh -c "apk add sqlite && touch /data/ConfigTest.db && sqlite3 /data/ConfigTest.db '.databases' && tail -f /dev/null"
    environment:
      - TZ=UTC
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /data/ConfigTest.db ]; then exit 0; else exit 1; fi"]
      interval: 10s
      timeout: 3s
      retries: 10  

volumes:
  sqlite_data:
    name: configtest_sqlite_data
networks:
  abp-network:
    name: configtest-network
    driver: bridge